---
name: CI pipeline

on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kadykov/fontbyte:ci-${{ github.sha }}

permissions:
  contents: read

jobs:
  pre_commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: pre-commit run --all-files

  verify:
    name: Verify renderer
    needs: pre_commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m unittest -q tests/test_github_filesize.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build verification image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=ghcr.io/kadykov/fontbyte:latest
          cache-to: type=inline

      - name: Render with limited fonts
        run: >
          docker container run --rm
          -v "${PWD}:/data"
          -w "/data"
          --user "$(id -u):$(id -g)"
          -e "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          -e "OUTPUT_DIR=/data"
          -e "MAX_FONTS=10"
          -e "MAX_CONCURRENT_REQUESTS=5"
          -e "REQUESTS_PER_MINUTE=60"
          ${{ env.IMAGE }}
