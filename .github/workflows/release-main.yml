---
name: Release and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ghcr.io/kadykov/fontbyte
  CANDIDATE_TAG: sha-${{ github.sha }}
  OUTPUT_DIR: public
  OUTPUT_ARTIFACTS_NAME: website

permissions:
  contents: read

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre_commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install pre-commit
      - run: pre-commit run --all-files

  unit_tests:
    name: Unit tests
    needs: pre_commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest -q tests/test_github_filesize.py

  build_candidate:
    name: Build and push candidate image
    needs: unit_tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build_candidate.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push candidate image
        id: build_candidate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}:${{ env.CANDIDATE_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}:latest
          cache-to: type=inline

  validate_and_render:
    name: Validate candidate with full render
    needs: build_candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull candidate image by digest
        run: >
          docker pull
          ${{ env.REGISTRY_IMAGE }}@${{ needs.build_candidate.outputs.image_digest }}

      - name: Render with full data
        run: >
          docker container run --rm
          -v "${PWD}:/work"
          -w "/work"
          --user "$(id -u):$(id -g)"
          -e "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          -e "MAX_CONCURRENT_REQUESTS=5"
          -e "REQUESTS_PER_MINUTE=60"
          ${{ env.REGISTRY_IMAGE }}@${{ needs.build_candidate.outputs.image_digest }}

      - run: mkdir -p ./${{ env.OUTPUT_DIR }} && cp ./*.html ./${{ env.OUTPUT_DIR }}

      - name: Upload rendered artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_ARTIFACTS_NAME }}
          path: ./${{ env.OUTPUT_DIR }}
          if-no-files-found: error

  promote_image:
    name: Promote candidate image
    needs: [validate_and_render, build_candidate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate digest to release tags
        run: >
          docker buildx imagetools create
          --tag ${{ env.REGISTRY_IMAGE }}:latest
          --tag ${{ env.REGISTRY_IMAGE }}:stable
          ${{ env.REGISTRY_IMAGE }}@${{ needs.build_candidate.outputs.image_digest }}

  publish:
    name: Publish to GitHub pages
    needs: [validate_and_render, promote_image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.OUTPUT_ARTIFACTS_NAME }}
          path: ${{ env.OUTPUT_DIR }}/

      - name: Deploy site to GitHub pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ env.OUTPUT_DIR }}
