---
name: Release and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ghcr.io/kadykov/fontbyte
  CANDIDATE_TAG: sha-${{ github.sha }}

permissions:
  contents: read

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre_commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: pre-commit run --all-files

  unit_tests:
    name: Unit tests
    needs: pre_commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m unittest -q tests/test_github_filesize.py

  build_candidate:
    name: Build and push candidate image
    needs: unit_tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build_candidate.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push candidate image
        id: build_candidate
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}:${{ env.CANDIDATE_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}:latest
          cache-to: type=inline

  verify_candidate:
    name: Verify candidate image
    needs: build_candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull candidate image by digest
        run: >
          docker pull
          ${{ env.REGISTRY_IMAGE }}@${{ needs.build_candidate.outputs.image_digest }}

      - name: Render with limited fonts
        run: >
          docker container run --rm
          -v "${PWD}:/data"
          -w "/data"
          --user "$(id -u):$(id -g)"
          -e "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          -e "OUTPUT_DIR=/data"
          -e "MAX_FONTS=10"
          -e "MAX_CONCURRENT_REQUESTS=5"
          -e "REQUESTS_PER_MINUTE=60"
          ${{ env.REGISTRY_IMAGE }}@${{ needs.build_candidate.outputs.image_digest }}

  promote_image:
    name: Promote candidate image
    needs: [build_candidate, verify_candidate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate digest to release tags
        run: >
          docker buildx imagetools create
          --tag ${{ env.REGISTRY_IMAGE }}:latest
          --tag ${{ env.REGISTRY_IMAGE }}:stable
          ${{ env.REGISTRY_IMAGE }}@${{ needs.build_candidate.outputs.image_digest }}
